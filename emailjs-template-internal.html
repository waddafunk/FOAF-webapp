<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
</head>
<body style="margin:0;padding:0;background-color:#f5efe0;font-family:'Helvetica Neue',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5efe0;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

          <!-- HEADER -->
          <tr>
            <td style="background-color:#6b0f2b;border-radius:12px 12px 0 0;padding:24px 32px;">
              <p style="margin:0;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#c8a96e;">
                ✦ &nbsp; FOAF — Nuova iscrizione
              </p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="background-color:#ffffff;border-radius:0 0 12px 12px;padding:32px;border:1px solid #e0d5c0;border-top:none;">

              <table width="100%" cellpadding="0" cellspacing="0">

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0e8d8;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">Nome</span><br/>
                    <span style="font-size:16px;color:#1a0a0a;font-weight:600;">{{nome}} {{cognome}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0e8d8;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">Email</span><br/>
                    <span style="font-size:16px;color:#6b0f2b;">{{email}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0e8d8;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">Città</span><br/>
                    <span style="font-size:16px;color:#1a0a0a;">{{citta}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0e8d8;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">Età</span><br/>
                    <span style="font-size:16px;color:#1a0a0a;">{{eta}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #f0e8d8;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">Come ha trovato FOAF</span><br/>
                    <span style="font-size:16px;color:#1a0a0a;">{{source}}</span>
                  </td>
                </tr>

                <tr>
                  <td style="padding:12px 0;">
                    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a6a;">+1</span><br/>
                    <span style="font-size:16px;color:#1a0a0a;">{{amico-nome}} {{amico-cognome}}</span><br/>
                    <span style="font-size:14px;color:#6b0f2b;">{{amico-contatto}}</span>
                  </td>
                </tr>

              </table>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:20px 0 0;text-align:center;">
              <p style="margin:0;font-size:11px;color:#8a7a6a;letter-spacing:1px;">
                FOAF · Notifica automatica iscrizione lista d'attesa
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
